name: Build Plugins

on:
  push:
    branches: [ master ]
    paths:
      - 'plugins/**'
      - 'annotations/**'
      - 'compiler/**'
      - 'buildSrc/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install LIEF for J2V8 16KB page alignment
        run: pip install lief
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build all plugins
        run: ./gradlew buildAllPlugins --no-daemon
      
      - name: Patch J2V8 .iplugin for Android 15+ (16KB page size)
        run: |
          SCRIPT="$(pwd)/scripts/patch_so_pagesize.py"
          for iplugin in plugins/engines/j2v8-engine/build/outputs/*.iplugin; do
            [ -f "$iplugin" ] || continue
            echo "Patching $iplugin..."
            TMPDIR=$(mktemp -d)
            unzip -q "$iplugin" -d "$TMPDIR"
            python3 "$SCRIPT" "$TMPDIR"/native/android/*/libj2v8.so
            rm "$iplugin"
            (cd "$TMPDIR" && zip -q -r "$OLDPWD/$iplugin" .)
            rm -rf "$TMPDIR"
            echo "Patched: $iplugin"
          done
      
      - name: Generate repository index
        run: ./gradlew repo --no-daemon
      
      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: |
            plugins/**/build/outputs/*.iplugin
            repo/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install LIEF for J2V8 16KB page alignment
        run: pip install lief
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build and generate repo
        run: |
          ./gradlew buildAllPlugins --no-daemon
      
      - name: Patch J2V8 .iplugin for Android 15+ (16KB page size)
        run: |
          SCRIPT="$(pwd)/scripts/patch_so_pagesize.py"
          for iplugin in plugins/engines/j2v8-engine/build/outputs/*.iplugin; do
            [ -f "$iplugin" ] || continue
            echo "Patching $iplugin..."
            TMPDIR=$(mktemp -d)
            unzip -q "$iplugin" -d "$TMPDIR"
            python3 "$SCRIPT" "$TMPDIR"/native/android/*/libj2v8.so
            rm "$iplugin"
            (cd "$TMPDIR" && zip -q -r "$OLDPWD/$iplugin" .)
            rm -rf "$TMPDIR"
            echo "Patched: $iplugin"
          done
          
          ./gradlew repo --no-daemon
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          destination_dir: repo
          keep_files: true
